workflows:
  ios-build:
    name: Build iOS IPA
    environment:
      node: 22
    scripts:
      - npm ci
      - npm run build
      - npx cap sync ios
      - xcodebuild -project ios/App/App.xcodeproj -scheme App -sdk iphoneos -configuration Release archive -archivePath $CM_BUILD_DIR/App.xcarchive
    artifacts:
      - $CM_BUILD_DIR/App.xcarchive