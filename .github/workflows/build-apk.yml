name: Build BellCraft APK

on:
  push:
    branches: [main, master]
  workflow_dispatch:
    inputs:
      api_url:
        description: 'API server URL'
        required: true
        default: 'https://bell-schedule-manager.replit.app'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        env:
          VITE_API_BASE_URL: ${{ github.event.inputs.api_url || 'https://bell-schedule-manager.replit.app' }}
        run: npm run build

      - name: Sync Capacitor Android
        run: npm run cap-sync-android

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BellCraft-Debug-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
